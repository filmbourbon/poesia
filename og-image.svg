<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Fundo âmbar -->
  <rect width="1200" height="630" fill="#E08A1A"/>
  <!-- Textura diagonal -->
  <defs>
    <pattern id="tex" width="20" height="20" patternUnits="userSpaceOnUse">
      <line x1="0" y1="20" x2="20" y2="0" stroke="#1A0A06" stroke-width=".8" opacity=".09"/>
    </pattern>
    <pattern id="bpog" width="24" height="16" patternUnits="userSpaceOnUse">
      <rect width="24" height="16" fill="#1A0A06"/>
      <path d="M12,2 C10,5 8,8 9,11 L12,14 L15,11 C16,8 14,5 12,2Z" fill="#E08A1A" opacity=".8"/>
      <circle cx="12" cy="1.5" r="1.5" fill="#E08A1A" opacity=".6"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#tex)"/>
  <!-- Bordas -->
  <rect x="0" y="0" width="1200" height="18" fill="url(#bpog)"/>
  <rect x="0" y="612" width="1200" height="18" fill="url(#bpog)"/>
  <!-- Cantos sólidos -->
  <rect x="0" y="0" width="18" height="18" fill="#1A0A06"/>
  <rect x="1182" y="0" width="18" height="18" fill="#1A0A06"/>
  <rect x="0" y="612" width="18" height="18" fill="#1A0A06"/>
  <rect x="1182" y="612" width="18" height="18" fill="#1A0A06"/>

  <!-- PÁSSARO ARMORIAL grande à direita -->
  <g transform="translate(740,60)">
    <ellipse cx="130" cy="330" rx="100" ry="138" fill="#1A0A06"/>
    <circle cx="130" cy="155" r="68" fill="#1A0A06"/>
    <!-- Crista âmbar -->
    <path d="M116,88 Q110,52 116,32 M130,84 Q130,46 140,26 M144,88 Q152,52 144,32 M100,96 Q90,62 98,40 M160,96 Q172,62 162,40" stroke="#E08A1A" stroke-width="9" stroke-linecap="round" fill="none"/>
    <!-- Bico -->
    <polygon points="72,152 40,164 72,176" fill="#F5A830"/>
    <!-- Olho -->
    <circle cx="100" cy="146" r="13" fill="#E08A1A"/>
    <circle cx="103" cy="145" r="6" fill="#1A0A06"/>
    <!-- Asas -->
    <path d="M32,318 Q-24,268 -16,212 Q18,278 6,244 Q32,288 20,262 Q40,308 28,288" stroke="#1A0A06" stroke-width="26" fill="none" stroke-linecap="round"/>
    <path d="M228,318 Q284,268 276,212 Q242,278 254,244 Q228,288 240,262 Q220,308 232,288" stroke="#1A0A06" stroke-width="26" fill="none" stroke-linecap="round"/>
    <!-- Cauda -->
    <path d="M106,464 L84,510 M130,468 L130,514 M154,464 L176,510" stroke="#1A0A06" stroke-width="20" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Sol no canto superior esquerdo -->
  <circle cx="110" cy="110" r="54" fill="#B86E0C" opacity=".6"/>
  <circle cx="110" cy="110" r="34" fill="#B86E0C" opacity=".8"/>
  <path d="M110,42 L110,60 M110,160 L110,178 M42,110 L60,110 M160,110 L178,110 M60,60 L74,74 M146,146 L160,160 M160,60 L146,74 M74,146 L60,160" stroke="#E08A1A" stroke-width="7" stroke-linecap="round" fill="none" opacity=".7"/>

  <!-- TÍTULO -->
  <text x="80" y="238" font-family="Georgia,serif" font-size="88" font-weight="bold" fill="#1A0A06" letter-spacing="-2">De nada</text>
  <text x="80" y="328" font-family="Georgia,serif" font-size="88" font-weight="bold" fill="#1A0A06" letter-spacing="-2">em nada,</text>
  <!-- "tudo." em vermelho -->
  <text x="80" y="438" font-family="Georgia,serif" font-size="108" font-style="italic" fill="#8B2218" letter-spacing="-2">tudo.</text>

  <!-- LINHA separadora -->
  <line x1="80" y1="482" x2="620" y2="482" stroke="#1A0A06" stroke-width="1.5" opacity=".3"/>

  <!-- Subtítulo -->
  <text x="80" y="520" font-family="Georgia,serif" font-size="22" fill="#1A0A06" opacity=".65" letter-spacing="3" font-style="italic">Documentário Nordestino  ·  Lei Rouanet PRONAC 258413</text>

  <!-- Bourbon Films -->
  <text x="80" y="575" font-family="Georgia,serif" font-size="16" fill="#1A0A06" opacity=".45" letter-spacing="5">BOURBON FILMS  ·  POESIA.ART.BR</text>

  <!-- Estrela heráldica canto -->
  <polygon points="1110,540 1113,556 1130,556 1117,565 1121,580 1110,572 1099,580 1103,565 1090,556 1107,556" fill="#1A0A06" opacity=".3"/>
</svg>
